name: Build and Push to ECR

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  SERVICE_NAME: ${{ vars.OCTOPUS_SERVICE }}

jobs:
  build-and-push:
    name: Build and Push Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # kept for an OIDC migration away from static keys

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semver tag
        id: semver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
            echo "Error: Tag '$TAG' is not a valid semver format"
            exit 1
          fi
          echo "✓ Valid semver tag: $VERSION"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          FULL_IMAGE="${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}"
          TAGS="${FULL_IMAGE}:${VERSION},${FULL_IMAGE}:latest"

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          if ! echo "$VERSION" | grep -q '-'; then
            TAGS="${TAGS},${FULL_IMAGE}:${MAJOR},${FULL_IMAGE}:${MAJOR}.${MINOR}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "image_uri=${FULL_IMAGE}:${VERSION}" >> $GITHUB_OUTPUT

      # Build for arm64 — the cluster runs Graviton nodes, so an amd64 image
      # would never schedule there.
      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./kubearchinspect
          file: ./kubearchinspect/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            KUBEARCHINSPECT_VERSION=0.7.0
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Octopus CLI
        uses: OctopusDeploy/install-octopus-cli-action@v3
        with:
          version: latest

      # Package the chart at the SAME version as the image and upload it to the
      # Octopus built-in feed. The Helm deploy step acquires it on the agent over
      # the Tentacle protocol (no docker, no Server-side acquisition). helm names
      # the file <chart-name>-<version>.tgz; the chart name is "kubearchinspect"
      # (Chart.yaml `name:`), which is the package_id the deploy step expects.
      - name: Package Helm chart and upload to Octopus
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: ${{ vars.OCTOPUS_SPACE }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          helm package ./kubearchinspect --version "$VERSION" --app-version "$VERSION" --destination .
          octopus package upload \
            --package "kubearchinspect-$VERSION.tgz" \
            --overwrite-mode overwrite \
            --no-prompt

      - name: Generate Build Information
        run: |
          COMMITS_JSON=$(git log -10 --format="%H%n%s%n%an%n%ae%n%aI%n---" | \
          python3 -c "
          import sys, json
          commits = []
          for block in sys.stdin.read().split('\n---\n'):
              parts = block.strip().split('\n')
              if len(parts) >= 5:
                  commits.append({
                      'Id': parts[0],
                      'LinkUrl': '${{ github.server_url }}/${{ github.repository }}/commit/' + parts[0],
                      'Comment': parts[1], 'AuthorName': parts[2],
                      'AuthorEmail': parts[3], 'Timestamp': parts[4]
                  })
          print(json.dumps(commits))
          ")

          cat > build-info.json << EOF
          {
            "BuildEnvironment": "GitHub Actions",
            "BuildNumber": "${{ github.run_number }}",
            "BuildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "Branch": "${{ github.ref_name }}",
            "VcsType": "Git",
            "VcsRoot": "${{ github.server_url }}/${{ github.repository }}.git",
            "VcsCommitNumber": "${{ github.sha }}",
            "Commits": ${COMMITS_JSON}
          }
          EOF

      - name: Push Build Information to Octopus Deploy
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: ${{ vars.OCTOPUS_SPACE }}
        run: |
          octopus build-information push \
            --package-id="${{ env.SERVICE_NAME }}" \
            --version="${{ steps.meta.outputs.version }}" \
            --file="build-info.json" \
            --overwrite-mode=OverwriteExisting

      - name: Create Release in Octopus Deploy
        uses: OctopusDeploy/create-release-action@v3
        with:
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          server: ${{ secrets.OCTOPUS_SERVER_URL }}
          space: ${{ vars.OCTOPUS_SPACE }}
          project: ${{ vars.OCTOPUS_PROJECT }}
          package_version: ${{ steps.meta.outputs.version }}
          release_number: ${{ steps.meta.outputs.version }}

      - name: Output Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ steps.meta.outputs.image_uri }} (linux/arm64)" >> $GITHUB_STEP_SUMMARY
          echo "**Chart:** kubearchinspect ${{ steps.meta.outputs.version }} (Octopus built-in feed)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build info pushed and release ${{ steps.meta.outputs.version }} created" >> $GITHUB_STEP_SUMMARY
